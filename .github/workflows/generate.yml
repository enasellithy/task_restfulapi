name: Cerebras Function Generator

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'الفرع المستهدف للتشغيل'
        required: true
        default: 'main'

jobs:
  generate-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, mysql, gd
          coverage: none

      - name: Install Composer Dependencies
        run: |
          composer update --no-interaction --prefer-dist --no-scripts --ignore-platform-reqs
          composer require laravel/dusk --dev --no-interaction --ignore-platform-reqs
          cp .env.example .env || true
          php artisan key:generate --force
          mkdir -p database
          touch database/database.sqlite
          php artisan optimize:clear || true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Python Dependencies
        run: pip install requests

      - name: Generate Unit & Selenium Tests
        env:
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
        run: |
          mkdir -p tests/Unit
          mkdir -p tests/Browser
          python .github/scripts/generate_docs.py

      - name: Prepare Selenium Environment
        run: |
          # تثبيت Dusk Binary
          php artisan dusk:install || true
          if [ -d "vendor/laravel/dusk/bin/" ]; then
            chmod -R 0755 vendor/laravel/dusk/bin/
          fi

      - name: Run All Generated Tests
        id: run-tests
