name: 🤖 AI Full Suite (Tests, Docs & PR)

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Branch to analyze'
        required: true
        default: 'main'

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-process:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install Dependencies
        run: pip install requests

      - name: 🤖 Run AI Generator
        env:
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
        run: python .github/scripts/ai_generator.py

      - name: 🚀 Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: AI generated Unit Tests, Selenium & Docs"
          branch: ai-generated-updates-${{ github.event.inputs.target_branch }}
          title: "🤖 AI Updates: Tests & Documentation"
          body: |
            This PR was generated by Cerebras AI.
            - ✅ Unit Tests Generated
            - ✅ Selenium Automation Tests
            - ✅ Technical Documentation
            - ✅ PHPDoc Updated in Source
          base: ${{ github.event.inputs.target_branch }}
