name: Cerebras Function Generator

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Branch to run on'
        required: true
        default: 'main'

jobs:
  generate-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, mysql, gd
          coverage: none

      - name: Install Composer Dependencies
        run: |
          composer update --no-interaction --prefer-dist --no-scripts --ignore-platform-reqs
          cp .env.example .env || true
          php artisan key:generate --force
          mkdir -p database
          touch database/database.sqlite
          php artisan optimize:clear || true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Python Dependencies
        run: pip install requests

      - name: Generate Unit & Selenium Tests
        env:
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
        run: |
          mkdir -p tests/Unit
          mkdir -p tests/Browser
          python .github/scripts/generate_docs.py

      - name: Prepare Selenium Environment
        run: |
          php artisan dusk:install || true
          chmod -R 0755 vendor/laravel/dusk/bin/

      - name: Run All Generated Tests
        id: run-tests
        run: |
          ./vendor/bin/phpunit tests/Unit --stop-on-failure
          
          php artisan serve --port=8000 &
          sleep 5
          php artisan dusk || echo "Selenium tests failed or not generated yet"
        continue-on-error: true

      - name: Open Issue on Failure
        if: steps.run-tests.outcome == 'failure'
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ Failure: Generated Tests Failed',
              body: 'The AI generated tests but they failed to pass. Check logs: ' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId
            })

      - name: Create Pull Request
        if: steps.run-tests.outcome == 'success'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: ai generated unit and selenium tests"
          branch: ai/generated-tests-${{ github.run_id }}
          delete-branch: true
          title: "🚀 AI Generated Tests (Unit & Selenium)"
          body: "This PR contains automated tests and documentation generated by Cerebras AI. All tests passed successfully."
          base: ${{ github.event.inputs.target_branch }}
