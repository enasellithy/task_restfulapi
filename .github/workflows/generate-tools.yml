name: Cerebras Function Generator

on:
  push:
    paths:
      - 'app/Http/**'
      - 'app/Solid/**'
  workflow_dispatch:
    inputs:
      target_branch:
        description: 
        required: true
        default: 'main'

jobs:
  generate-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch || github.ref }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, mysql, gd
          coverage: none

      - name: Install Composer Dependencies
        run: |
          composer update --no-interaction --prefer-dist --no-scripts --ignore-platform-reqs
          cp .env.example .env || true
          php artisan key:generate --force
          mkdir -p database
          touch database/database.sqlite
          php artisan optimize:clear || true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Python Dependencies
        run: pip install requests

      - name: Run Cerebras Generator
        env:
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
        run: |
          mkdir -p tests/Unit
          mkdir -p tests/Browser
          python .github/scripts/generate_docs.py

      - name: Debug: List Generated Files
        run: |
          echo "Checking tests/Unit folder:"
          ls -R tests/Unit
          echo "Checking tests/Browser folder:"
          ls -R tests/Browser || echo "No browser tests"

      - name: Prepare for Selenium Tests
        run: |
          php artisan dusk:install || true

      - name: Run Tests (Unit & Selenium)
        id: run-tests
        run: |
          ./vendor/bin/phpunit tests/Unit --stop-on-failure
          php artisan serve &
          sleep 5
          php artisan dusk || echo "Dusk tests failed"
        continue-on-error: true

      - name: Open Issue on Test Failure
        if: steps.run-tests.outcome == 'failure'
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ Failure in Unit/Selenium Tests',
              body: 'The workflow failed during testing. Check logs: ' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId
            })

      - name: Create Pull Request
        if: steps.run-tests.outcome == 'success'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: update generated functions and tests"
          branch: gen/docs_${{ github.run_id }}
          delete-branch: true
          title: "🚀 AI Generated Tools, Docs & Tests"
          body: |
            Automated content generated by Cerebras.
            - Unit Tests: Executed ✅
            - Selenium/Dusk: Executed ✅
          base: ${{ github.event.inputs.target_branch || 'main' }}
