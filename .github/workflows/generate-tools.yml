name: Cerebras Function Generator

on:
  push:
    paths:
      - 'app/Http/**'
      - 'app/SOLID/**'
  workflow_dispatch:

jobs:
  generate-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, mysql, gd
          coverage: none

      - name: Install Composer Dependencies
        run: |
          composer update --no-interaction --prefer-dist --no-scripts --ignore-platform-reqs
          cp .env.example .env || true
          php artisan key:generate --force
          # حل مشكلة Target class [files] does not exist
          php artisan optimize:clear || true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Python Dependencies
        run: pip install requests

      - name: Run Cerebras Generator
        env:
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
        run: python .github/scripts/generate_docs.py

      - name: Run PHPUnit Tests
        id: run-tests
        run: php artisan test --testsuite=Unit
        continue-on-error: true

      - name: Open Issue on Test Failure
        if: steps.run-tests.outcome == 'failure'
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ Critical: BindingResolutionException [files] or Test Failure',
              body: 'The workflow failed. This could be due to the "Target class [files] does not exist" error or actual test failures. Check logs: ' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId
            })

      - name: Create Pull Request
        if: steps.run-tests.outcome == 'success'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: update generated functions via Cerebras"
          branch: feature/auto-docs-${{ github.run_id }}
          title: "🚀 AI Generated Tools & Docs"
          body: "Automated documentation generated by Cerebras. All tests passed."
          base: main
